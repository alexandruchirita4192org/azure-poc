name: Order Functions CI

on:
  pull_request:
    paths:
      - 'src/OrderFunctions/**'
      - 'tests/OrderFunctions.Tests/**'
      - '.github/workflows/order-functions-ci.yml'
      - 'Directory.Build.props'
  push:
    branches:
      - master
    paths:
      - 'src/OrderFunctions/**'
      - 'tests/OrderFunctions.Tests/**'
      - '.github/workflows/order-functions-ci.yml'
      - 'Directory.Build.props'

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore tests/OrderFunctions.Tests/OrderFunctions.Tests.csproj --locked-mode

      - name: Build
        run: dotnet build tests/OrderFunctions.Tests/OrderFunctions.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/OrderFunctions.Tests/OrderFunctions.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=OrderFunctions.Tests.trx"
